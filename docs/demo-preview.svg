<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Vista previa de la demo Streamlit">
  <defs>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3d6fa5"/><stop offset="1" stop-color="#5aa9e6"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" rx="10" fill="#eef2f7"/>
  <!-- barra de ventana -->
  <rect width="920" height="38" rx="10" fill="#1e3a5f"/>
  <rect y="20" width="920" height="18" fill="#1e3a5f"/>
  <circle cx="20" cy="19" r="5" fill="#ff5f56"/><circle cx="38" cy="19" r="5" fill="#ffbd2e"/><circle cx="56" cy="19" r="5" fill="#27c93f"/>
  <rect x="90" y="10" width="500" height="18" rx="9" fill="#2c4a6e"/>
  <text x="104" y="23" fill="#9ecbf0" font-size="11">localhost:8501 — Procesador de Manifiestos</text>

  <!-- sidebar -->
  <rect x="0" y="38" width="200" height="522" fill="#f6f8fb"/>
