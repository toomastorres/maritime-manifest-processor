  <rect x="22" y="112" width="156" height="26" rx="5" fill="#fff" stroke="#cbd5e1"/>
  <text x="32" y="129" fill="#1a1a1a" font-size="12">1.22</text>
  <rect x="22" y="156" width="156" height="34" rx="6" fill="#1e3a5f"/>
  <text x="100" y="178" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">▶ Usar ejemplo</text>
