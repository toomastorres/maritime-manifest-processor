  <line x1="248" y1="370" x2="528" y2="370" stroke="#e2e8f0"/>
  <rect x="276" y="300" width="60" height="70" rx="3" fill="url(#bar)"/>
  <rect x="436" y="250" width="60" height="120" rx="3" fill="url(#bar)"/>
  <text x="306" y="388" fill="#64748b" font-size="10" text-anchor="middle">Contenedor</text>
  <text x="466" y="388" fill="#64748b" font-size="10" text-anchor="middle">Vehículos</text>
  <text x="306" y="293" fill="#1e3a5f" font-size="11" text-anchor="middle" font-weight="700">2</text>
  <text x="466" y="243" fill="#1e3a5f" font-size="11" text-anchor="middle" font-weight="700">3</text>

