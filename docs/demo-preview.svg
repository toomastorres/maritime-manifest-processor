  <rect x="568" y="226" width="322" height="22" fill="#f1f5f9"/>
  <text x="576" y="241" fill="#475569" font-size="10">B/L            Tipo            Carga             THC</text>
  <g fill="#334155" font-size="10">
    <text x="576" y="266">S329600001   Contenedor   3 High Cube     120</text>
    <text x="576" y="290">S329600002   Vehículos    5 NEW DELTAR    500</text>
    <text x="576" y="314">S329600003   Vehículos    4 NEW CORVEX     400</text>
  </g>
  <line x1="568" y1="276" x2="890" y2="276" stroke="#eef2f7"/>
  <line x1="568" y1="300" x2="890" y2="300" stroke="#eef2f7"/>

  <!-- descargas -->
  <text x="224" y="424" fill="#334155" font-size="12" font-weight="700">⬇️ Descargas</text>
  <g font-size="10" fill="#1e3a5f">
    <rect x="224" y="436" width="158" height="30" rx="5" fill="#fff" stroke="#cbd5e1"/><text x="236" y="455">ATL_0426-Impo.xlsx</text>
    <rect x="392" y="436" width="158" height="30" rx="5" fill="#fff" stroke="#cbd5e1"/><text x="404" y="455">ATL_0426-Expo.xlsx</text>
    <rect x="560" y="436" width="158" height="30" rx="5" fill="#fff" stroke="#cbd5e1"/><text x="572" y="455">ATL_0426-ENS.xlsx</text>
    <rect x="728" y="436" width="170" height="30" rx="5" fill="#1e3a5f"/><text x="746" y="455" fill="#fff">⬇ Descargar todo (.zip)</text>
  </g>
  <text x="224" y="500" fill="#94a3b8" font-size="10">Datos de ejemplo 100% sintéticos — el motor y las reglas de negocio son reales.</text>
