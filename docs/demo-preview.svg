  <text x="100" y="232" fill="#94a3b8" font-size="10" text-anchor="middle">…o subí tus CSV</text>

  <!-- contenido -->
  <text x="224" y="74" fill="#1e3a5f" font-size="20" font-weight="800">🚢 Procesador de Manifiestos Marítimos</text>
  <text x="224" y="96" fill="#64748b" font-size="11">Liquidación de manifiestos IMPO/EXPO en segundos</text>

  <!-- métricas -->
  <g>
    <rect x="224" y="112" width="158" height="64" rx="8" fill="#fff" stroke="#e2e8f0"/>
