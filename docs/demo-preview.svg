    <text x="240" y="162" fill="#1e3a5f" font-size="26" font-weight="800">5</text>
    <rect x="392" y="112" width="158" height="64" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="408" y="134" fill="#64748b" font-size="11">Reportes</text>
    <text x="408" y="162" fill="#1e3a5f" font-size="26" font-weight="800">8</text>
    <rect x="560" y="112" width="158" height="64" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="576" y="134" fill="#64748b" font-size="11">Manifiestos</text>
    <text x="576" y="162" fill="#1e3a5f" font-size="26" font-weight="800">2</text>
